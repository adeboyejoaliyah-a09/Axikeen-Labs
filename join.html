<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Our Community - SaneSpace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
       /* background: linear-gradient(110.6deg, rgb(184, 142, 252) 2.2%, rgb(104, 119, 244) 100.2%); */
       background: linear-gradient(106.4deg, rgb(255, 104, 192) 11.1%, rgb(104, 84, 249) 81.3%);
        color: #fff;
        font-family: "Segoe UI", sans-serif;
      }
      .card {
        border-radius: 1.5rem;
      }
      .btn-purple {
        background-color: #6f42c1;
        color: #fff;
      }
      .btn-purple:hover {
        background-color: #5a32a3;
        color: #fff;
      }
      .space{
        color: #6f42c1;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-lg p-4 text-dark">
            <div class="card-body">
              <h2 class="text-center text-purple mb-3">
                Join Our Community
              </h2>
              <p class="text-center text-muted mb-4">
                Be part of a supportive family at <strong>Sane<span class="space">Space</span></strong>.
                Connect with others, share your journey, and grow together in a
                safe space. 
              </p>
              <form>
                <!-- Name -->
                <div class="mb-3">
                  <label for="name" class="form-label">Full Name</label>
                  <input
                    type="text"
                    id="name"
                    class="form-control"
                    placeholder="Enter your name"
                    required
                  />
                </div>
                <!-- Email -->
                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required
                  />
                </div>
                <!-- Interest -->
                <div class="mb-3">
                  <label for="interest" class="form-label"
                    >Why do you want to join?</label
                  >
                  <select id="interest" class="form-select" required>
                    <option value="">-- Select an option --</option>
                    <option>Community Support</option>
                    <option>Group Therapy</option>
                    <option>Self-Care Resources</option>
                    <option>Private Counseling</option>
                  </select>
                </div>
                <!-- Message -->
                <div class="mb-3">
                  <label for="message" class="form-label">Short Message</label>
                  <textarea
                    id="message"
                    class="form-control"
                    rows="3"
                    placeholder="Tell us about yourself"
                  ></textarea>
                </div>
                <!-- Submit -->
                 <div class="col-12 text-center">
        <button type="submit" class="btn btn-success px-4">Summit Now</button>
      </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
