<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - SaneSpace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      /* background: #f8f9fa; */
            background: linear-gradient(106.4deg, rgb(255, 104, 192) 11.1%, rgb(104, 84, 249) 81.3%);
    }
    .contact-section {
      padding: 60px 0;
    }
    .contact-card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      padding: 30px;
    }
    .text-purple {
      color: #6f42c1;
    }
  </style>
</head>
<body>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="container">
      <div class="row mb-4 text-center">
        <h2 class="fw-bold text-light">Contact Us</h2>
        <p class="text-light">We’re here to support you. Reach out anytime — we’d love to hear from you!</p>
      </div>

      <div class="row g-4 text-purple">
        <!-- Contact Info -->
        <div class="col-md-5">
          <div class="contact-card">
            <h5 class="fw-bold mb-3">Get in Touch</h5>
            <p><strong>Address:</strong> 123 Wellness Avenue, Lagos, Nigeria</p>
            <p><strong>Phone:</strong> +234 810 075 0041</p>
            <p><strong>Email:</strong> support@sanespace.com</p>
            <p><strong>Open Hours:</strong> Mon – Sat: 9am – 6pm</p>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="col-md-7">
          <div class="contact-card">
            <h5 class="fw-bold mb-3">Send Us a Message</h5>
            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Your name">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="your@email.com">
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="5" placeholder="Write your message..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100" style="background:#6f42c1; border:none;">
                Send Message
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
