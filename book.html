<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
  body {
    background: linear-gradient(106.4deg, rgb(255, 104, 192) 11.1%, rgb(104, 84, 249) 81.3%);
    margin-top: 0;
    /* Reset margin for navbar */
  }

  /* Ensure bootstrap doesn't conflict too much */
  .navbar ul {
    padding-left: 0;
    margin-bottom: 0;
  }

  /* Dark Mode Overrides */
  body.dark-mode {
    background: var(--bg-body);
    color: var(--text-main);
  }

  body.dark-mode .bg-light {
    background-color: var(--bg-body) !important;
  }

  body.dark-mode .bg-white {
    background-color: var(--bg-surface) !important;
    color: var(--text-main);
  }

  body.dark-mode h2 {
    color: var(--text-main);
  }

  body.dark-mode .form-label {
    color: var(--text-muted);
  }

  body.dark-mode .form-control,
  body.dark-mode .form-select {
    background-color: var(--bg-alt);
    border-color: var(--border-light);
    color: var(--text-main);
  }
</style>

<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">Sane<span>Space</span></a>
      <div class="hamburger" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
      </div>
      <ul class="nav-links">
        <li><a href="index.html#about" class="nav-link">About Us</a></li>
        <li><a href="conditions.html" class="nav-link">Conditions A-Z</a></li>
        <li><a href="exercises.html" class="nav-link">Exercises</a></li>
        <li><a href="index.html#ourservices" class="nav-link">Services</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        <li><a href="join.html" class="btn btn-primary" style="padding: 0.5rem 1.25rem;">Join Community</a></li>
        <li>
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <script src="index.js"></script>
  <section class="py-5 bg-light">
    <div class="container">
      <h2 class="text-center mb-4 fw-bold">Book an Appointment</h2>
      <form class="row g-3 shadow p-4 rounded bg-white">
        <div class="col-md-6">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
        </div>
        <div class="col-md-6">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>
        <div class="col-md-6">
          <label for="date" class="form-label">Preferred Date</label>
          <input type="date" class="form-control" id="date" required>
        </div>
        <div class="col-md-6">
          <label for="time" class="form-label">Preferred Time</label>
          <input type="time" class="form-control" id="time" required>
        </div>
        <div class="col-12">
          <label for="service" class="form-label">Type of Session</label>
          <select class="form-select" id="service">
            <option selected>Choose...</option>
            <option>Private Counseling</option>
            <option>Group Therapy</option>
            <option>Meditation Session</option>
            <option>Community Activity</option>
          </select>
        </div>
        <div class="col-12">
          <label for="message" class="form-label">Additional Notes</label>
          <textarea class="form-control" id="message" rows="3" placeholder="Anything you'd like us to know?"></textarea>
        </div>
        <div class="col-12 text-center">
          <button type="submit" class="btn btn-success px-4">Book Now</button>
        </div>
      </form>
    </div>
  </section>

</body>

</html>
