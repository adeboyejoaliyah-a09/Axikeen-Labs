<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Private Session - SaneSpace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      /* background: linear-gradient(135deg, #6f42c1, #b388eb); */
      background: linear-gradient(106.4deg, rgb(255, 104, 192) 11.1%, rgb(104, 84, 249) 81.3%);
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      border-radius: 1.5rem;
    }
    .btn-purple {
      background-color: #6f42c1;
      color: #fff;
    }
    .btn-purple:hover {
      background-color: #5a32a3;
      color: #fff;
    }
    label {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg p-4">
          <div class="card-body">
            <h2 class="text-center text-purple mb-3">Book a Private Session</h2>
            <p class="text-center text-muted mb-4">
              Schedule a confidential one-on-one therapy session with a licensed professional at <strong>SaneSpace</strong>.  
              Choose your preferred date, time, and session type.
            </p>
            <!-- Booking Form -->
            <form>
              <!-- Full Name -->
              <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
              </div>

              <!-- Phone -->
              <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" class="form-control" placeholder="+234 702 643 6480" required>
              </div>

              <!-- Session Type -->
              <div class="mb-3">
                <label for="sessionType" class="form-label">Session Type</label>
                <select id="sessionType" class="form-select" required>
                  <option value="">-- Select --</option>
                  <option>Video Call</option>
                  <option>Phone Call</option>
                  <option>In-Person</option>
                </select>
              </div>

              <!-- Date -->
              <div class="mb-3">
                <label for="date" class="form-label">Preferred Date</label>
                <input type="date" id="date" class="form-control" required>
              </div>

              <!-- Time -->
              <div class="mb-3">
                <label for="time" class="form-label">Preferred Time</label>
                <input type="time" id="time" class="form-control" required>
              </div>

              <!-- Notes -->
              <div class="mb-3">
                <label for="notes" class="form-label">Additional Notes</label>
                <textarea id="notes" class="form-control" rows="3" placeholder="Anything you'd like us to know?"></textarea>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" class="btn btn-purple btn-lg">Confirm Booking</button>
              </div>
            </form>

            <p class="text-center mt-3 text-muted">
              Need help? <a href="contact.html" class="text-decoration-none text-purple fw-bold">Contact Support</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
